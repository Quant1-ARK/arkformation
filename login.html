<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #0071e3; --accent-h: #0077ed;
  --bg: #f5f5f7; --white: #fff;
  --text-1: #1d1d1f; --text-2: #6e6e73; --text-3: #aeaeb2;
  --border: rgba(0,0,0,0.1); --red: #ff3b30;
}
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; -webkit-font-smoothing:antialiased; }
.card { background:var(--white); border-radius:22px; padding:40px 36px; width:100%; max-width:420px; box-shadow:0 2px 40px rgba(0,0,0,0.08); }
.logo { font-family:'Times New Roman',serif; font-size:22px; letter-spacing:.2em; color:var(--text-1); margin-bottom:28px; }
h1 { font-size:24px; font-weight:600; letter-spacing:-.02em; margin-bottom:6px; }
.sub { font-size:14px; color:var(--text-2); font-weight:300; margin-bottom:28px; line-height:1.5; }
.field { margin-bottom:14px; }
label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; }
input[type="email"], input[type="password"] { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; font-family:inherit; color:var(--text-1); outline:none; transition:border-color .15s; }
input:focus { border-color:var(--accent); }
.row { display:flex; align-items:center; gap:8px; margin-bottom:20px; margin-top:4px; }
.row input[type="checkbox"] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.row label { font-size:13px; font-weight:400; color:var(--text-2); margin:0; cursor:pointer; }
.forgot { font-size:13px; color:var(--accent); text-decoration:none; margin-left:auto; flex-shrink:0; }
.forgot:hover { opacity:.7; }
.btn { width:100%; padding:12px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; border:none; border-radius:980px; cursor:pointer; font-family:inherit; transition:background .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn:hover { background:var(--accent-h); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
@keyframes spin { to { transform:rotate(360deg); } }
.alert { display:none; margin-top:14px; padding:11px 14px; border-radius:10px; font-size:13px; line-height:1.5; }
.alert.error { background:rgba(255,59,48,.08); color:#c0392b; border:1px solid rgba(255,59,48,.15); }
.divider { height:1px; background:var(--border); margin:22px 0; }
.footer-link { text-align:center; font-size:13px; color:var(--text-2); font-weight:300; }
.footer-link a { color:var(--accent); text-decoration:none; font-weight:500; }
.back { position:fixed; top:20px; left:20px; font-size:15px; font-weight:500; color:var(--text-2); text-decoration:none; transition:color .15s; }
.back:hover { color:var(--text-1); }
</style>
</head>
<body>
<a href="index.html" class="back">← Retour</a>
<div class="card">
  <div class="logo">ARK</div>
  <h1>Connexion</h1>
  <p class="sub">Accède à ton espace de formation.</p>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="row">
    <input type="checkbox" id="remember" checked>
    <label for="remember">Se souvenir de moi</label>
    <a href="reset.html" class="forgot">Mot de passe oublié ?</a>
  </div>

  <button class="btn" id="btn" onclick="login()">
    <span id="btn-text">Se connecter</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="alert error" id="alert"></div>

  <div class="divider"></div>
  <div class="footer-link">Pas encore de compte ? <a href="signup.html">Créer un compte</a></div>
</div>

<script>
const SUPABASE_URL = 'https://wlwwkqijedhxmwjktqvj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd3drcWlqZWRoeG13amt0cXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY0NDcsImV4cCI6MjA5MDEyMjQ0N30.x4nGTPYfLbkPz0tAejhde_RO4Oto5scGSW8H72FwKOU';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, storageKey: 'ark_session' }
});

// Gérer le callback de confirmation email
(async () => {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);

  // Supabase redirige avec #access_token ou ?token_hash
  if (hash && hash.includes('access_token')) {
    const hashParams = new URLSearchParams(hash.slice(1));
    const { error } = await db.auth.setSession({
      access_token: hashParams.get('access_token'),
      refresh_token: hashParams.get('refresh_token'),
    });
    if (!error) { window.location.href = 'ark_dashboard.html'; return; }
  }

  // Token hash dans l'URL (nouveau format Supabase)
  if (params.get('token_hash') && params.get('type')) {
    const { error } = await db.auth.verifyOtp({
      token_hash: params.get('token_hash'),
      type: params.get('type'),
    });
    if (!error) { window.location.href = 'ark_dashboard.html'; return; }
  }

  // Session déjà active
  const { data: { session } } = await db.auth.getSession();
  if (session && session.user) window.location.href = 'ark_dashboard.html';
})();

function setLoading(on) {
  document.getElementById('btn').disabled = on;
  document.getElementById('btn-text').textContent = on ? 'Connexion…' : 'Se connecter';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}

function showError(msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;

  document.getElementById('alert').style.display = 'none';
  if (!email || !password) { showError('Remplis tous les champs.'); return; }

  setLoading(true);

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading(false);
    const msg = error.message.toLowerCase().includes('invalid') ? 'Email ou mot de passe incorrect.' : error.message;
    showError(msg);
    return;
  }

  // Se souvenir de moi : stocker l'expiry dans localStorage
  if (remember) {
    const expiry = Date.now() + 7 * 24 * 60 * 60 * 1000;
    localStorage.setItem('ark_remember_expiry', expiry);
  }

  window.location.href = 'ark_dashboard.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
