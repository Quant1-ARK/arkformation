<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>
<div id="quiz-wrap">
  <div style="display:flex;align-items:center;margin-bottom:16px;"><span class="quiz-tag" style="margin-bottom:0;flex-shrink:0;">Module 01 - Macro Trading</span><div class="progress-bar-wrap"><div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div><div class="progress-label"><span id="qnum">1</span>/4</div></div></div>
  <div class="quiz-q" id="qtext"></div>
  <div class="quiz-opts" id="qopts"></div>
  <div class="explanation-box" id="explanation-box">
    <div class="expl-header">
      <span class="expl-label">Explication</span>
      <span class="expl-source" id="expl-source"></span>
    </div>
    <div class="expl-text" id="expl-text"></div>
  </div>
  <div class="quiz-actions">
    <button class="btn-validate" id="btn-validate" onclick="validateAnswer()">Valider</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question suivante &rarr;</button>
    <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">Passer</button>
    <span class="qscore" id="qscore"></span>
  </div>
</div>
<div id="result-wrap" class="result-wrap" style="display:none;"></div>
<script>
var QS_BASE = [{"q": "Qu'est-ce que le carry trade dans le Forex ?", "expl": "Le carry trade consiste a emprunter dans une devise a faible taux d'interet pour investir dans une devise a taux plus eleve, capturant ainsi la difference de rendement (le carry).", "src": "Module I.c - Strategies de change", "opts": [{"t": "Acheter une devise qui se deprecie rapidement", "ok": false}, {"t": "Emprunter dans une devise a faible taux pour investir dans une devise a taux eleve", "ok": true}, {"t": "Vendre a decouvert une paire de devises correlees", "ok": false}, {"t": "Arbitrer deux marches obligataires de zones differentes", "ok": false}]}, {"q": "Quel indicateur mesure le rapport entre rendement et volatilite ?", "expl": "Le ratio de Sharpe mesure le rendement excedentaire par unite de risque (volatilite). Plus il est eleve, meilleure est la performance ajustee du risque d'une strategie.", "src": "Module I.e - Metriques de performance", "opts": [{"t": "Le ratio de Calmar", "ok": false}, {"t": "Le win rate", "ok": false}, {"t": "Le ratio de Sharpe", "ok": true}, {"t": "Le maximum drawdown", "ok": false}]}, {"q": "Qu'est-ce qu'un regime de marche risk-off ?", "expl": "En regime risk-off, les investisseurs fuient les actifs risques vers des valeurs refuges : dollar americain, yen japonais, or, obligations souveraines de qualite.", "src": "Module I.b - Regimes de marche", "opts": [{"t": "Un marche ou les actifs risques surperforment", "ok": false}, {"t": "Une phase ou les investisseurs fuient vers les actifs refuges", "ok": true}, {"t": "Une volatilite inferieure a 10%", "ok": false}, {"t": "Une periode de taux negatifs", "ok": false}]}, {"q": "Qu'est-ce que le drawdown dans le trading ?", "expl": "Le drawdown mesure la perte maximale entre un pic et un creux de valorisation. C'est un indicateur cle du risque d'une strategie, independamment du rendement.", "src": "Module I.d - Gestion du risque", "opts": [{"t": "Le profit total d'une strategie sur une annee", "ok": false}, {"t": "La baisse maximale depuis un pic jusqu'a un creux", "ok": true}, {"t": "Le nombre de trades perdants consecutifs", "ok": false}, {"t": "Le levier utilise sur une position", "ok": false}]}];
var QS = [];
var qIdx = 0, qScore = 0, qAnswered = false, qSelected = -1;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startQuiz() {
  QS = shuffle(QS_BASE);
  qIdx = 0; qScore = 0; qAnswered = false; qSelected = -1;
  renderQ();
}

function renderQ() {
  if (qIdx >= QS.length) { showResult(); return; }
  var q = QS[qIdx];
  qAnswered = false;
  qSelected = -1;
  document.getElementById('qnum').textContent = qIdx + 1;
  document.getElementById('prog-fill').style.width = Math.round((qIdx / QS.length) * 100) + '%';
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('qscore').textContent = qIdx > 0 ? 'Score : ' + qScore + '/' + qIdx : '';
  document.getElementById('btn-validate').className = 'btn-validate';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-validate').style.display = '';
  document.getElementById('btn-skip').style.display = '';
  document.getElementById('explanation-box').className = 'explanation-box';
  var wrap = document.getElementById('qopts');
  wrap.innerHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    var b = document.createElement('button');
    b.className = 'quiz-opt';
    b.textContent = q.opts[i].t;
    (function(btn, idx) { btn.onclick = function() { selectOpt(btn, idx); }; })(b, i);
    wrap.appendChild(b);
  }
}

function selectOpt(btn, idx) {
  if (qAnswered) return;
  qSelected = idx;
  var opts = document.querySelectorAll('.quiz-opt');
  for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('selected'); }
  btn.classList.add('selected');
  document.getElementById('btn-validate').className = 'btn-validate active';
}

function validateAnswer() {
  if (qAnswered || qSelected < 0) return;
  qAnswered = true;
  var q = QS[qIdx];
  var ok = q.opts[qSelected].ok;
  var opts = document.querySelectorAll('.quiz-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    opts[i].classList.remove('selected');
    if (q.opts[i].ok) opts[i].classList.add('correct');
  }
  if (!ok) { opts[qSelected].classList.add('wrong'); }
  else { qScore++; }
  if (q.expl) {
    document.getElementById('expl-text').textContent = q.expl;
    document.getElementById('expl-source').textContent = q.src || '';
    document.getElementById('expl-source').style.display = q.src ? '' : 'none';
    document.getElementById('explanation-box').className = 'explanation-box show';
  }
  document.getElementById('btn-validate').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('qscore').textContent = 'Score : ' + qScore + '/' + (qIdx + 1);
}

function nextQuestion() { qIdx++; renderQ(); }
function skipQuestion() { qIdx++; renderQ(); }

function showResult() {
  document.getElementById('quiz-wrap').style.display = 'none';
  var pct = Math.round(qScore / QS.length * 100);
  var ico = pct >= 80 ? '&#127942;' : pct >= 50 ? '&#128077;' : '&#128218;';
  var msg = pct >= 80 ? 'Excellent travail !' : pct >= 50 ? 'Bon resultat !' : 'Continue a reviser !';
  var panel = document.getElementById('result-wrap');
  panel.style.display = 'block';
  panel.innerHTML = '<div style="font-size:48px;margin-bottom:12px;">' + ico + '</div>'
    + '<div class="result-title">' + qScore + ' / ' + QS.length + ' - ' + pct + '%</div>'
    + '<div class="result-sub">' + msg + '</div>'
    + '<button class="btn-retry" onclick="restartQuiz()">Recommencer</button>';
  if (typeof window.saveQuizScore === 'function') {
    window.saveQuizScore('Macro Trading', qScore, QS.length, pct);
  }
}

function restartQuiz() {
  document.getElementById('quiz-wrap').style.display = 'flex';
  document.getElementById('result-wrap').style.display = 'none';
  startQuiz();
}

startQuiz();
</script>
</body>
</html>
