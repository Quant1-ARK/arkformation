<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; font-size: 15px; line-height: 1.5; color: #1d1d1f; background: transparent; padding: 0; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.quiz-tag { font-size: 11px; font-weight: 600; color: #0071e3; background: rgba(0,113,227,0.09); padding: 3px 10px; border-radius: 980px; }
.quiz-counter { font-size: 12px; color: #aeaeb2; }
.quiz-q { font-size: 17px; font-weight: 500; letter-spacing: -.01em; line-height: 1.55; margin-bottom: 20px; }
.quiz-opts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 20px; }
.quiz-opt { padding: 13px 18px; border-radius: 12px; border: 1.5px solid #e8e8ed; font-size: 14px; cursor: pointer; transition: all .15s; background: #fff; text-align: left; font-family: inherit; width: 100%; }
.quiz-opt:hover:not(:disabled) { border-color: #0071e3; background: rgba(0,113,227,0.06); color: #0071e3; }
.quiz-opt.correct { border-color: #34c759; background: rgba(52,199,89,0.08); color: #2aa34a; font-weight: 500; }
.quiz-opt.wrong { border-color: #ff3b30; background: rgba(255,59,48,0.07); color: #d93025; }
.quiz-opt:disabled { cursor: default; }
.quiz-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.btn-next { font-size: 14px; font-weight: 500; background: #0071e3; color: #fff; padding: 10px 22px; border-radius: 980px; border: none; cursor: pointer; font-family: inherit; transition: background .15s; }
.btn-next:hover { background: #0077ed; }
.btn-skip { font-size: 14px; font-weight: 400; color: #6e6e73; padding: 10px 16px; border-radius: 980px; border: none; cursor: pointer; background: #f5f5f7; font-family: inherit; }
.btn-skip:hover { background: #e8e8ed; }
.quiz-score { font-size: 12px; color: #aeaeb2; margin-left: auto; }
.result-panel { text-align: center; padding: 24px 0; }
.result-ico { font-size: 48px; margin-bottom: 12px; }
.result-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.result-sub { font-size: 14px; color: #6e6e73; font-weight: 300; margin-bottom: 20px; }
.btn-retry { font-size: 14px; font-weight: 500; background: #0071e3; color: #fff; padding: 10px 24px; border-radius: 980px; border: none; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div id="quiz-wrap">
  <div class="quiz-header">
    <span class="quiz-tag">Quiz Ultime · Tous les modules</span>
    <span class="quiz-counter">Q <span id="qnum">1</span>/16</span>
  </div>
  <div class="quiz-q" id="qtext"></div>
  <div class="quiz-opts" id="qopts"></div>
  <div class="quiz-actions">
    <button class="btn-next" id="btn-next" onclick="next()">Question suivante</button>
    <button class="btn-skip" onclick="skip()">Passer</button>
    <span class="quiz-score" id="qscore"></span>
  </div>
</div>
<div id="result-panel" class="result-panel" style="display:none;"></div>

<script>
const QS = [{"q": "Qu"est-ce que le "carry trade" dans le contexte du Forex ?", "opts": [{"t": "Acheter une devise qui se déprécie rapidement", "ok": false}, {"t": "Emprunter dans une devise à faible taux pour investir dans une devise à taux élevé", "ok": true}, {"t": "Vendre à découvert une paire de devises corrélées", "ok": false}, {"t": "Arbitrer deux marchés obligataires de zones différentes", "ok": false}]}, {"q": "Quel indicateur mesure le rapport entre rendement excédentaire et volatilité ?", "opts": [{"t": "Le ratio de Calmar", "ok": false}, {"t": "Le win rate", "ok": false}, {"t": "Le ratio de Sharpe", "ok": true}, {"t": "Le maximum drawdown", "ok": false}]}, {"q": "Qu"est-ce qu"un régime de marché "risk-off" ?", "opts": [{"t": "Un marché où les actifs risqués surperforment", "ok": false}, {"t": "Une phase où les investisseurs fuient vers les actifs refuges", "ok": true}, {"t": "Une volatilité inférieure à 10%", "ok": false}, {"t": "Une période de taux d"intérêt négatifs", "ok": false}]}, {"q": "Qu"est-ce que le "drawdown" dans le trading ?", "opts": [{"t": "Le profit total d"une stratégie sur une année", "ok": false}, {"t": "La baisse maximale depuis un pic jusqu"à un creux", "ok": true}, {"t": "Le nombre de trades perdants consécutifs", "ok": false}, {"t": "Le levier utilisé sur une position", "ok": false}]}, {"q": "Quelle théorie économique associe la stabilité financière à l"accumulation des risques ?", "opts": [{"t": "La main invisible d"Adam Smith", "ok": false}, {"t": "La destruction créatrice de Schumpeter", "ok": false}, {"t": "L"instabilité endogène de Minsky", "ok": true}, {"t": "Le monétarisme de Friedman", "ok": false}]}, {"q": "Qu"est-ce que le marché primaire ?", "opts": [{"t": "Le marché où les investisseurs échangent des titres entre eux", "ok": false}, {"t": "Le marché où les entreprises émettent de nouveaux titres pour lever des capitaux", "ok": true}, {"t": "Le marché des matières premières", "ok": false}, {"t": "Le marché des devises internationales", "ok": false}]}, {"q": "Que signifie une courbe des taux inversée ?", "opts": [{"t": "Les taux courts sont supérieurs aux taux longs, signal de récession potentielle", "ok": true}, {"t": "Les taux longs sont supérieurs aux taux courts, situation normale", "ok": false}, {"t": "Les taux sont identiques quelle que soit la maturité", "ok": false}, {"t": "Les taux d"intérêt sont négatifs sur toutes les maturités", "ok": false}]}, {"q": "Qu"est-ce qu"un bull market ?", "opts": [{"t": "Un marché en baisse de plus de 20% depuis son sommet", "ok": false}, {"t": "Un marché latéral sans tendance claire", "ok": false}, {"t": "Une tendance haussière prolongée associée à l"expansion économique", "ok": true}, {"t": "Un marché caractérisé par une forte volatilité", "ok": false}]}, {"q": "Lequel de ces indicateurs est considéré comme avancé (leading indicator) ?", "opts": [{"t": "Le taux de chômage", "ok": false}, {"t": "Le PIB trimestriel", "ok": false}, {"t": "Le PMI manufacturier", "ok": true}, {"t": "Les ventes au détail", "ok": false}]}, {"q": "Qu"est-ce que le QE (Quantitative Easing) ?", "opts": [{"t": "Une hausse des taux directeurs pour freiner l"inflation", "ok": false}, {"t": "Un achat d"actifs par la banque centrale pour injecter des liquidités", "ok": true}, {"t": "Une réduction de la masse monétaire en circulation", "ok": false}, {"t": "Un accord commercial entre pays développés", "ok": false}]}, {"q": "Qu"est-ce que l"inflation par les coûts (cost-push) ?", "opts": [{"t": "Une hausse des prix causée par une demande excessive", "ok": false}, {"t": "Une hausse des prix liée à une création monétaire excessive", "ok": false}, {"t": "Une hausse des prix causée par un choc sur l"offre", "ok": true}, {"t": "Une baisse générale des prix liée à la déflation", "ok": false}]}, {"q": "Quelle est la formule de l"avantage comparatif selon Ricardo ?", "opts": [{"t": "Chaque pays produit ce qu"il produit le mieux en absolu", "ok": false}, {"t": "Chaque pays se spécialise dans ce qu"il produit relativement mieux", "ok": true}, {"t": "Les pays échangent uniquement si leurs coûts de production sont identiques", "ok": false}, {"t": "La spécialisation internationale nuit toujours à l"emploi local", "ok": false}]}, {"q": "En phase de récession économique, quels actifs surperforment généralement ?", "opts": [{"t": "Les actions de croissance et les matières premières industrielles", "ok": false}, {"t": "Les obligations souveraines, l"or et les secteurs défensifs", "ok": true}, {"t": "L"immobilier commercial et les SPAC", "ok": false}, {"t": "Les cryptomonnaies et les actifs à haut rendement", "ok": false}]}, {"q": "Qu"est-ce qu"un spread de crédit ?", "opts": [{"t": "L"écart entre le taux directeur et le taux d"inflation", "ok": false}, {"t": "La différence de rendement entre une obligation d"entreprise et une obligation souveraine", "ok": true}, {"t": "La commission prélevée par un courtier sur une transaction", "ok": false}, {"t": "L"écart entre le prix d"achat et de vente d"un actif", "ok": false}]}, {"q": "Quel est l"effet d"une hausse des taux d"intérêt sur les obligations existantes ?", "opts": [{"t": "Leur valeur augmente car elles deviennent plus attractives", "ok": false}, {"t": "Leur valeur reste stable, seul le coupon change", "ok": false}, {"t": "Leur valeur baisse car leur coupon devient inférieur aux nouvelles émissions", "ok": true}, {"t": "Leur valeur double car les investisseurs fuient les actions", "ok": false}]}, {"q": "Qu"est-ce que la destruction créatrice selon Schumpeter ?", "opts": [{"t": "La destruction physique d"usines lors de crises économiques", "ok": false}, {"t": "Le processus par lequel les innovations détruisent les structures économiques existantes pour en créer de nouvelles", "ok": true}, {"t": "La faillite des entreprises non rentables en période de récession", "ok": false}, {"t": "La dévaluation monétaire qui détruit l"épargne des ménages", "ok": false}]}];
let idx = 0, score = 0, answered = false;

function render() {
  if (idx >= QS.length) { showResult(); return; }
  const q = QS[idx];
  answered = false;
  document.getElementById('qnum').textContent = idx + 1;
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('qscore').textContent = idx > 0 ? 'Score : ' + score + '/' + idx : '';
  const wrap = document.getElementById('qopts');
  wrap.innerHTML = '';
  q.opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.textContent = o.t;
    b.onclick = () => answer(b, o.ok);
    wrap.appendChild(b);
  });
}

function answer(btn, ok) {
  if (answered) return;
  answered = true;
  if (ok) { btn.classList.add('correct'); score++; }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach((b, i) => { if (QS[idx].opts[i].ok) b.classList.add('correct'); });
  }
  document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
}

function next() { idx++; render(); }
function skip() { idx++; render(); }

function showResult() {
  document.getElementById('quiz-wrap').style.display = 'none';
  const pct = Math.round(score / QS.length * 100);
  const ico = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '📚';
  const msg = pct >= 80 ? 'Excellent travail !' : pct >= 50 ? 'Bon résultat !' : 'Continue à réviser !';
  document.getElementById('result-panel').style.display = 'block';
  document.getElementById('result-panel').innerHTML =
    '<div class="result-ico">' + ico + '</div>' +
    '<div class="result-title">' + score + ' / ' + QS.length + ' — ' + pct + '%</div>' +
    '<div class="result-sub">' + msg + '</div>' +
    '<button class="btn-retry" onclick="restart()">Recommencer</button>';
}

function restart() {
  idx = 0; score = 0; answered = false;
  document.getElementById('quiz-wrap').style.display = 'block';
  document.getElementById('result-panel').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
