<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK — Programme</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #f5f5f5;
    --surface-2: #f5f5f5;
    --surface-3: #f5f5f5;
    --border: rgba(19, 18, 18, 0.411);
    --border-active: rgba(255,255,255,0.14);
    --text-primary: #000000;
    --text-secondary: #59595e;
    --text-tertiary: #48484c;
    --accent: #0071e3;
    --accent-glow: rgba(0,113,227,0.18);
    --accent-soft: rgba(0,113,227,0.12);
    --gold: #c9a84c;
    --gold-soft: rgba(201,168,76,0.1);
    --sidebar-w: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgb(252, 252, 252);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
    z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'Times New Roman', Times, serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--text-primary);
  }
  .topbar-sep { width: 1px; height: 16px; background: var(--border); }
  .topbar-label { font-size: 12px; color: var(--text-tertiary); letter-spacing: 0.02em; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .progress-ring-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-label { font-size: 12px; color: var(--text-secondary); }
  .progress-bar { width: 80px; height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 8.33%; background: linear-gradient(90deg, var(--accent), #5ac8fa); border-radius: 2px; transition: width 0.5s ease; }

  .btn-back {
    font-size: 12px;
    color: var(--text-secondary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color .15s;
  }
  .btn-back:hover { color: var(--text-primary); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
  .sidebar-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  .sidebar-list { overflow-y: auto; flex: 1; padding: 10px 0; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
    border-radius: 0;
  }
  .sidebar-item:hover { background: var(--surface-2); }
  .sidebar-item.active { background: var(--accent-soft); }
  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 6px; bottom: 6px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
  }
  .sidebar-item.done .item-index { color: #30d158; }
  .sidebar-item.done .item-index::after { content: '✓'; font-size: 9px; }

  .item-index {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
    width: 22px;
    flex-shrink: 0;
    transition: color .15s;
  }
  .sidebar-item.active .item-index { color: var(--accent); }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    line-height: 1.3;
    transition: color .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-item:hover .item-name,
  .sidebar-item.active .item-name { color: var(--text-primary); }

  .item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid var(--text-tertiary);
    flex-shrink: 0;
    transition: all .15s;
  }
  .sidebar-item.active .item-dot { background: var(--accent); border-color: var(--accent); }
  .sidebar-item.done .item-dot { background: #30d158; border-color: #30d158; }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    position: relative;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

  .module-content {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 40px 80px;
    display: none;
    animation: fadeIn .3s ease;
  }
  .module-content.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── MODULE HEADER ── */
  .mod-number {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mod-number::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--accent);
  }

  .mod-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  .mod-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .mod-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 10px;
    border-radius: 980px;
    border: 1px solid rgba(0,113,227,0.15);
  }

  .mod-divider { height: 1px; background: var(--border); margin: 28px 0; }

  .mod-intro {
    font-size: 17px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 36px;
    font-style: italic;
    border-left: 2px solid var(--accent);
    padding-left: 20px;
  }

  .mod-section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 16px;
  }

  .mod-objectives { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 36px; }
  .mod-objectives li {
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 14px; color: var(--text-secondary); line-height: 1.6;
  }
  .obj-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border-active);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: var(--text-tertiary);
  }

  .mod-concepts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 36px;
  }
  .concept-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color .2s, background .2s;
  }
  .concept-card:hover { border-color: var(--border-active); background: var(--surface-2); }
  .concept-icon { font-size: 20px; margin-bottom: 8px; }
  .concept-name { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .concept-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; font-weight: 300; }

  .mod-quote {
    background: var(--gold-soft);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 36px;
  }
  .mod-quote-text { font-family: 'DM Serif Display', Georgia, serif; font-size: 18px; line-height: 1.6; color: var(--gold); margin-bottom: 8px; font-style: italic; }
  .mod-quote-source { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; }

  .mod-locked {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    margin-top: 32px;
  }
  .lock-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.5; }
  .lock-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
  .lock-desc { font-size: 14px; color: var(--text-tertiary); font-weight: 300; line-height: 1.6; max-width: 320px; margin: 0 auto 24px; }
  .lock-cta {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 980px;
    text-decoration: none;
    transition: all .2s;
  }
  .lock-cta:hover { background: #0077ed; transform: scale(1.02); }

  /* ── NAV PREV / NEXT ── */
  .mod-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 52px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .mod-nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
    font-family: inherit;
  }
  .mod-nav-btn:hover { border-color: var(--border-active); color: var(--text-primary); background: var(--surface-2); }
  .mod-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .mod-nav-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── WELCOME SCREEN ── */
  .welcome-screen {
    max-width: 700px;
    margin: 0 auto;
    padding: 64px 40px 80px;
    animation: fadeIn .4s ease;
  }
  .welcome-kicker { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .welcome-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.1;
    margin-bottom: 20px;
    color: var(--text-primary);
  }
  .welcome-sub { font-size: 16px; font-weight: 300; color: var(--text-secondary); line-height: 1.7; margin-bottom: 40px; max-width: 520px; }
  .welcome-stats { display: flex; gap: 32px; margin-bottom: 48px; flex-wrap: wrap; }
  .wstat { }
  .wstat-val { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
  .wstat-label { font-size: 12px; color: var(--text-tertiary); font-weight: 300; }
  .welcome-start-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 24px;
    border-radius: 12px;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all .2s;
  }
  .welcome-start-btn:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,113,227,0.3); }

  /* ── MOBILE SIDEBAR TOGGLE ── */
  .sidebar-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 14px;
    transition: all .15s;
  }
  .sidebar-toggle:hover { border-color: var(--border-active); color: var(--text-primary); }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 52px; bottom: 0;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform .3s ease;
      box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; }
    .module-content, .welcome-screen { padding: 32px 20px 60px; }
    .progress-ring-wrap { display: none; }
    .main { overflow-y: auto; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="Menu">☰</button>
    <div class="topbar-logo">ARK</div>
    <div class="topbar-sep"></div>
    <div class="topbar-label">Investor Program</div>
  </div>
  <div class="topbar-right">
    <div class="progress-ring-wrap">
      <div class="progress-label" id="progressLabel">Module 1 / 12</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <a href="index.html" class="btn-back">← Retour</a>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-eyebrow">Programme</div>

    </div>

        <div class="wstat"><div class="wstat-val">12</div><div class="wstat-label">Modules</div></div>

        <div class="wstat"><div class="wstat-val">0€</div><div class="wstat-label">Prérequis</div></div>
      </div>
      <button class="welcome-start-btn" onclick="selectModule(0)">
        Commencer le Module 01 →
      </button>
    </div>

    <!-- MODULES (populated by JS) -->
    <div id="modulePages"></div>

  </main>
</div>

const modules = [
  {

let currentModule = null;

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = modules.map((m, i) => `
    <div class="sidebar-item" id="sidebarItem${i}" onclick="selectModule(${i})">
      <div class="item-index">${String(m.id).padStart(2, '0')}</div>
      <div class="item-info">
        <div class="item-name">${m.title}</div>
      </div>
      <div class="item-dot"></div>
    </div>
  `).join('');
}

function buildModules() {
  const container = document.getElementById('modulePages');
  container.innerHTML = modules.map((m, i) => `
    <div class="module-content" id="modulePage${i}">
      <div class="mod-number">Module ${String(m.id).padStart(2, '0')}</div>
      <h1 class="mod-title">${m.title}</h1>
      <div class="mod-tags">${m.tags.map(t => `<span class="mod-tag">${t}</span>`).join('')}</div>

      <p class="mod-intro">${m.intro}</p>

      <div class="mod-section-title">Ce que tu vas apprendre</div>
      <ul class="mod-objectives">
        ${m.objectives.map(o => `<li><div class="obj-check">○</div><span>${o}</span></li>`).join('')}
      </ul>

      <div class="mod-divider"></div>

      <div class="mod-section-title">Concepts clés</div>
      <div class="mod-concepts-grid">
        ${m.concepts.map(c => `
          <div class="concept-card">
            <div class="concept-icon">${c.icon}</div>
            <div class="concept-name">${c.name}</div>
            <div class="concept-desc">${c.desc}</div>
          </div>
        `).join('')}
      </div>

      <div class="mod-quote">
        <div class="mod-quote-text">"${m.quote.text}"</div>
        <div class="mod-quote-source">— ${m.quote.source}</div>
      </div>

      <div class="mod-nav">
        <button class="mod-nav-btn" onclick="selectModule(${i - 1})" ${i === 0 ? 'disabled' : ''}>
          ← Précédent
        </button>
        <span class="mod-nav-label">${i + 1} / ${modules.length}</span>
        <button class="mod-nav-btn" onclick="selectModule(${i + 1})" ${i === modules.length - 1 ? 'disabled' : ''}>
          Suivant →
        </button>
      </div>
    </div>
  `).join('');
}

function selectModule(index) {
  if (index < 0 || index >= modules.length) return;

  // Hide welcome
  document.getElementById('welcomeScreen').style.display = 'none';

  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Update pages
  document.querySelectorAll('.module-content').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Update progress
  const fill = Math.round(((index + 1) / modules.length) * 100);
  document.getElementById('progressFill').style.width = fill + '%';
  document.getElementById('progressLabel').textContent = `Module ${index + 1} / ${modules.length}`;

  currentModule = index;

  // Scroll content to top
  document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Check URL hash for direct module navigation
function checkHash() {
  const hash = window.location.hash;
  if (hash === '#module') {
    selectModule(0);
  }
}

buildSidebar();
buildModules();
checkHash();
</script>
