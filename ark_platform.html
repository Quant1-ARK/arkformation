<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK — Programme</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --border: rgba(19,18,18,.41);
    --text-1: #000;
    --text-2: #59595e;
    --text-3: #48484c;
    --accent: #0071e3;
    --accent-soft: rgba(0,113,227,.12);
    --sidebar-w: 280px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text-1);font-family:'DM Sans',-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

  /* TOP BAR */
  .topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:#fcfcfc;flex-shrink:0;z-index:50}
  .topbar-left{display:flex;align-items:center;gap:16px}
  .topbar-logo{font-family:'Times New Roman',serif;font-size:17px;letter-spacing:.2em}
  .topbar-sep{width:1px;height:16px;background:var(--border)}
  .topbar-label{font-size:12px;color:var(--text-3);letter-spacing:.02em}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .progress-ring-wrap{display:flex;align-items:center;gap:8px}
  .progress-label{font-size:12px;color:var(--text-2)}
  .progress-bar{width:80px;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#5ac8fa);border-radius:2px;transition:width .5s ease}
  .btn-back{font-size:12px;color:var(--text-2);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .15s}
  .btn-back:hover{color:var(--text-1)}

  /* LAYOUT */
  .layout{display:flex;flex:1;overflow:hidden}

  /* SIDEBAR */
  .sidebar{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease,opacity .25s ease}
  .sidebar.collapsed{width:0;opacity:0;border-right:none}
  .sidebar-header{padding:20px 20px 14px 52px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
  .sidebar-title{font-size:14px;font-weight:600}
  .sidebar-list{overflow-y:auto;flex:1;padding:10px 0}
  .sidebar-list::-webkit-scrollbar{width:4px}
  .sidebar-list::-webkit-scrollbar-track{background:transparent}
  .sidebar-list::-webkit-scrollbar-thumb{background:var(--bg);border-radius:2px}

  .sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s;position:relative}
  .sidebar-item:hover{background:rgba(0,0,0,.04)}
  .sidebar-item.active{background:var(--accent-soft)}
  .sidebar-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--accent);border-radius:1px}
  .sidebar-item.done .item-index{color:#30d158}
  .sidebar-item.done .item-index::after{content:'✓';font-size:9px}
  .item-index{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.04em;width:22px;flex-shrink:0;transition:color .15s}
  .sidebar-item.active .item-index{color:var(--accent)}
  .item-info{flex:1;min-width:0}
  .item-name{font-size:13px;font-weight:500;color:var(--text-2);line-height:1.3;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar-item:hover .item-name,.sidebar-item.active .item-name{color:var(--text-1)}
  .item-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--text-3);flex-shrink:0;transition:all .15s}
  .sidebar-item.active .item-dot{background:var(--accent);border-color:var(--accent)}
  .sidebar-item.done .item-dot{background:#30d158;border-color:#30d158}

  /* MAIN */
  .main{flex:1;overflow:hidden;background:var(--bg);position:relative;display:flex;flex-direction:column}

  /* WELCOME */
  .welcome-screen{padding:64px clamp(24px,5vw,80px) 80px;animation:fadeIn .4s ease;overflow-y:auto}
  .welcome-kicker{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
  .welcome-title{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(32px,5vw,52px);line-height:1.1;margin-bottom:20px}
  .welcome-sub{font-size:16px;font-weight:300;color:var(--text-2);line-height:1.7;margin-bottom:40px;max-width:520px}
  .welcome-start-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:500;padding:14px 24px;border-radius:12px;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
  .welcome-start-btn:hover{background:#0077ed;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,113,227,.3)}

  /* IFRAME */
  #module-frame{flex:1;border:none;width:100%;display:none;background:var(--bg)}
  #module-frame.active{display:block}
  .welcome-screen.hidden{display:none}

  /* SIDEBAR TOGGLE */
  .sidebar-toggle{position:fixed;top:77px;left:16px;z-index:50;display:flex;flex-direction:column;justify-content:center;gap:5px;width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer}
  .toggle-bar{display:block;width:100%;height:1.5px;background:var(--text-3);border-radius:2px;transition:all .2s ease;transform-origin:center}
  .sidebar-toggle:hover .toggle-bar{background:var(--text-1)}
  .sidebar-toggle.open .toggle-bar:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  .sidebar-toggle.open .toggle-bar:nth-child(2){opacity:0;transform:scaleX(0)}
  .sidebar-toggle.open .toggle-bar:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:768px){
    .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .3s ease;box-shadow:4px 0 24px rgba(0,0,0,.15);width:var(--sidebar-w)!important;opacity:1!important}
    .sidebar.open{transform:translateX(0)}
    .sidebar.collapsed{transform:translateX(-100%)}
    .progress-ring-wrap{display:none}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">ARK</div>
    <div class="topbar-sep"></div>
    <div class="topbar-label">Investor Program</div>
  </div>
  <div class="topbar-right">
    <div class="progress-ring-wrap">
      <div class="progress-label" id="progressLabel">Module 1 / 12</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <a href="ark_dashboard.html" class="btn-back">← Retour</a>
    <button onclick="ARK.logout()" style="font-size:12px;color:var(--text-2);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;transition:color .15s" onmouseover="this.style.color='#000'" onmouseout="this.style.color='var(--text-2)'">Déconnexion</button>
  </div>
</div>

<div class="layout">
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Afficher/masquer le menu">
    <span class="toggle-bar"></span>
    <span class="toggle-bar"></span>
    <span class="toggle-bar"></span>
  </button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-eyebrow">Programme</div>
      <div class="sidebar-title">12 Modules</div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-kicker">Bienvenue dans ARK</div>
      <h1 class="welcome-title">Reprends le<br>contrôle.</h1>
      <p class="welcome-sub">Ton programme complet est ici. 12 modules pour comprendre les marchés, construire des thèses, gérer le risque et penser en investisseur indépendant.</p>
      <button class="welcome-start-btn" onclick="selectModule(0)">Commencer le Module 01 →</button>
    </div>
    <iframe id="module-frame" title="Module ARK"></iframe>
  </main>
</div>

<script>
const modules = [
  { id:  1, title: "Introduction : Le Cadre de Pensée" },
  { id:  2, title: "Les Marchés Financiers" },
  { id:  3, title: "Analyse Macroéconomique" },
  { id:  4, title: "Analyse des Actifs" },
  { id:  5, title: "Construction d'une Thèse" },
  { id:  6, title: "Analyse Technique Appliquée" },
  { id:  7, title: "Prise de Position" },
  { id:  8, title: "Gestion du Risque" },
  { id:  9, title: "Management de Portfolio" },
  { id: 10, title: "Psychologie & Discipline" },
  { id: 11, title: "Métriques de Trading" },
  { id: 12, title: "Fiscalité & Cadre Juridique" },
];

let currentModule = null;

// DB exposé par auth.js via window.ARK.db
function getDB() {
  return window.ARK && window.ARK.db ? window.ARK.db : null;
}

function getProgress() {
  try { return JSON.parse(localStorage.getItem('ark_progress')) || { current: 0, done: [] }; }
  catch(e) { return { current: 0, done: [] }; }
}

function saveProgress(current, done) {
  // 1. Sauvegarder localement (immédiat)
  localStorage.setItem('ark_progress', JSON.stringify({ current, done }));
  // 2. Sync Supabase (async, sans bloquer)
  syncProgressToSupabase(current, done);
}

async function syncProgressToSupabase(current, done) {
  try {
    const { data: { session } } = await getDB().auth.getSession();
    if (!session) return;
    await getDB().from('user_progress').upsert({
      user_id: session.user.id,
      current: current,
      done: done,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id' });
  } catch(e) {
    // Silencieux — le localStorage reste la source de vérité locale
  }
}

async function loadProgressFromSupabase() {
  try {
    const { data: { session } } = await getDB().auth.getSession();
    if (!session) return null;
    const { data } = await getDB().from('user_progress')
      .select('current, done').eq('user_id', session.user.id).single();
    return data || null;
  } catch(e) { return null; }
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = modules.map((m, i) => `
    <div class="sidebar-item" id="sidebarItem${i}" onclick="selectModule(${i})">
      <div class="item-index">${String(m.id).padStart(2,'0')}</div>
      <div class="item-info"><div class="item-name">${m.title}</div></div>
      <div class="item-dot"></div>
    </div>
  `).join('');
}

function selectModule(index, markPreviousDone = false) {
  if (index < 0 || index >= modules.length) return;

  const progress = getProgress();
  if (markPreviousDone && currentModule !== null && !progress.done.includes(currentModule)) {
    progress.done.push(currentModule);
  }
  progress.current = index;
  saveProgress(index, progress.done);

  // Hide welcome, show iframe
  document.getElementById('welcomeScreen').classList.add('hidden');
  const frame = document.getElementById('module-frame');
  frame.classList.add('active');

  // Load module page
  const padded = String(modules[index].id).padStart(2, '0');
  frame.src = `modules/module${padded}.html`;

  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    el.classList.toggle('done', progress.done.includes(i));
  });

  // Update progress bar
  const fill = Math.round((progress.done.length / modules.length) * 100);
  document.getElementById('progressFill').style.width = fill + '%';
  document.getElementById('progressLabel').textContent = `Module ${index + 1} / ${modules.length}`;

  currentModule = index;

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarToggle');
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('open');
  } else {
    const isCollapsed = sidebar.classList.toggle('collapsed');
    btn.classList.toggle('open', !isCollapsed);
  }
}

// Navigation depuis l'iframe (appelé par les boutons Précédent/Suivant des modules)
window.addEventListener('message', e => {
  if (e.data?.type === 'navigate') selectModule(e.data.index, e.data.markDone);
});

// Restaurer la progression
async function init() {
  buildSidebar();

  const hash = window.location.hash;
  const match = hash.match(/^#module-(\d+)$/);
  if (match) {
    const idx = modules.findIndex(m => m.id === parseInt(match[1]));
    if (idx !== -1) { selectModule(idx); return; }
  }
  if (hash === '#module') { selectModule(0); return; }

  // Charger depuis Supabase — source de vérité
  const remote = await loadProgressFromSupabase();

  if (remote === null) {
    // Nouveau compte ou pas d'entrée Supabase → reset localStorage et partir de zéro
    localStorage.removeItem('ark_progress');
    return;
  }

  // Supabase a des données → les utiliser comme source de vérité
  const done = Array.isArray(remote.done) ? remote.done : [];
  const current = remote.current || 0;
  localStorage.setItem('ark_progress', JSON.stringify({ current, done }));

  if (current > 0 || done.length > 0) {
    selectModule(current);
  }
}

init();
</script>
</body>
</html>
